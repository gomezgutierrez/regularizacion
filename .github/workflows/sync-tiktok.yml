name: Sync TikTok to Blog

on:
  schedule:
    - cron: '0 * * * *' # Revisar cada hora (al minuto 0)
  workflow_dispatch: # Permite sincronización manual desde el panel de GitHub
    inputs:
      manual_urls:
        description: 'URL(s) de TikTok separadas por comas (ej: https://tiktok.com/@u/video/123). Si está vacío, se escanea el perfil.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.manual_urls }}" ]; then
            IFS=',' read -ra ADDR <<< "${{ github.event.inputs.manual_urls }}"
            for url in "${ADDR[@]}"; do
              id=$(echo $url | grep -oP 'video/\K\d+')
              echo "Sincronizando manual: $url (ID: $id)"
              node scripts/sync-tiktok.mjs "{\"id\":\"$id\", \"title\":\"Post Manual\", \"slug\":\"manual-$id\", \"description\":\"Sincronización manual solicitada via GitHub Actions.\"}"
            done
          else
            echo "Iniciando escaneo automático..."
            node scripts/scan-tiktok.mjs
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name 'TikTok-Sync-Bot'
          git config --global user.email 'sync-bot@regularizacionmasiva.es'
          git add .
          git commit -m "feat(blog): auto-publish new post from TikTok" || echo "No changes to commit"
          git push
